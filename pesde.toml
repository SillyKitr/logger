name = "kitr/logger"
version = "0.1.0"
description = 'A quite useful logger module for most of your needs; contains a really simple API that is very easy to understand and use. it provides a better logging experience instead of just print("Hello world!")'
authors = ["SillyKitr"]
license = "MIT"
includes = ["src/**", "pesde.toml", "README.md", "LICENSE"]

[target]
environment = "lune"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"
